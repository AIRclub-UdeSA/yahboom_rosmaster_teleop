teleop_twist_joy_node:
  ros__parameters:
    # --- Translation: right stick ---
    axis_linear:
      x: 4        # right stick vertical -> forward/backward
      y: 3        # right stick horizontal -> left/right (strafe)
    scale_linear:
      x: 0.5
      y: 0.5
    scale_linear_turbo:
      x: 1.0
      y: 1.0

    # --- Rotation: left stick ---
    axis_angular:
      yaw: 0      # left stick horizontal -> turn
    scale_angular:
      yaw: 1.0
    scale_angular_turbo:
      yaw: 2.0

    # --- Safety ---
    enable_button: 5        # normal "dead man's switch" button (e.g. RB/R1)
    enable_turbo_button: 4  # turbo mode button (e.g. LB/L1)